name: Build HTML from LaTeX (with make4ht)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TeX Live
        uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: >
            scheme-small
            collection-latexrecommended
            collection-latexextra
            collection-fontsrecommended
            collection-plaingeneric
            collection-pictures
            make4ht
            tex4ht
            dvisvgm
            lmodern

      - name: Verify toolchain
        run: |
          which make4ht
          make4ht --version

      - name: Build HTML with make4ht
        run: |
          mkdir -p _html
          make4ht -u -f html5 -d _html stb-template.tex "mathjax,fn-in"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdercrystallography-html
          path: _html
          if-no-files-found: error
