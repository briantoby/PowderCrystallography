name: Build HTML from LaTeX (with make4ht)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-html:
    runs-on: ubuntu-24.04
    container:
      image: texlive/texlive:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          which make4ht
          make4ht --version

      - name: Build HTML with make4ht
        run: |
          mkdir -p _html
          make4ht -u -f html5 -d _html HTML-template.tex "mathjax,fn-in,xhtml,3"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdercrystallography-html
          path: _html
          if-no-files-found: error

      # Optional safety: remove root index.html if make4ht creates one
      - name: Remove root index.html (if present)
        run: |
          rm -f _html/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _html

  deploy-pages:
    needs: build-html
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
