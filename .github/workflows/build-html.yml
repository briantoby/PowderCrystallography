name: Build HTML from LaTeX (with make4ht)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live base
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-plain-generic \
            texlive-pictures \
            texlive-xetex \
            texlive-luatex \
            lmodern \
            dvisvgm \
            perl \
            wget \
            xz-utils

      - name: Install make4ht via tlmgr (user mode)
        run: |
          tlmgr init-usertree
          tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet
          tlmgr --usermode install make4ht tex4ht

      - name: Put tlmgr user bin on PATH
        run: |
          echo "$HOME/texmf/bin/x86_64-linux" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          which make4ht
          make4ht --version

      - name: Build HTML with make4ht
        run: |
          mkdir -p _html
          make4ht -u -f html5 -d _html stb-template.tex "mathjax,fn-in"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdercrystallography-html
          path: _html
          if-no-files-found: error
