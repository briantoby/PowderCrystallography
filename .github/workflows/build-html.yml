name: Build HTML from LaTeX (with make4ht)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-24.04
    container:
      image: texlive/texlive:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          which make4ht
          make4ht --version

      - name: Build HTML with make4ht
        run: |
          mkdir -p _html
          make4ht -u -f html5 -d _html HTML-template.tex "mathjax,fn-in" "3"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdercrystallography-html
          path: _html
          if-no-files-found: error
